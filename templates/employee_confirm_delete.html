<!DOCTYPE html>
<html>

<head>
    <title>Delete Employee</title>
</head>

<body>
    <h1>Delete Employee</h1>
    <p>Are you sure you want to delete <strong>{{ employee.name }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'employee_list' %}">Cancel</a>
    </form>
</body>

</html>
